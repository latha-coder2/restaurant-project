<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feasto</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
        <i class="fa-solid fa-user fa-xl" id="user-icon" style="color:white;"></i>

        <div class="user-login">

            <i class="fa-solid fa-xmark" id="login-close"></i>
            <div class="welcome-sec">
                <h2 class="text-[50px] font-bold">Welcome Back</h2>
                <p>Login to continue your food journey</p>
            </div>


            <div class="form-sec-div">
                <form class="form-sec">

                    <label>Email*</label>
                    <input type="email" placeholder="Enter Your Email" id="loginEmail">

                    <label>Password*</label>
                    <input type="password" placeholder="Enter Password" id="loginPassword">

                </form>

                <button id="signinbtn" onclick="loginUser(event)">
                    Sign In
                </button>

                <button class="guest-btn" onclick="continueAsGuest()">
                    Continue as Guest
                </button>

                <h5>Not registered?<span><a href="register.html">
                            Register here</a></span>
                </h5>
            </div>

        </div>
    <script src="./effect.js"></script>
</body>
</html>
